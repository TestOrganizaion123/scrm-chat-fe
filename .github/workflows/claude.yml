name: Claude Code

# Khai báo khi nào workflow này sẽ được chạy
on:
  issue_comment:
    types: [created] # Chạy khi có comment vào một Issue hoặc PR.
  pull_request_review_comment:
    types: [created] # Chạy khi có comment vào các dòng code cụ thể trong một PR đang được review.

# Định nghĩa những việc gì sẽ được hệ thống thực hiện sau khi khối on được kích hoạt.
jobs:
  # Khai báo job claude
  claude:
    # Chỉ chạy khi comment có chứa từ khóa @claude
    if: contains(github.event.comment.body, '@claude')
    # Sử dụng workflow reusable đã tạo sẵn
    uses: TestOrganizaion123/.github/.github/workflows/claude-reusable.yml@main
    secrets: inherit
    permissions:
      contents: write
      pull-requests: write
      issues: write
